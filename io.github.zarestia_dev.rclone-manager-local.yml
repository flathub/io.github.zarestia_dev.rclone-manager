id: io.github.zarestia_dev.rclone-manager

runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node20
  - org.freedesktop.Sdk.Extension.rust-stable

command: rclone-manager
build-options:
  append-path: /usr/lib/sdk/node20/bin:/usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/rclone-manager/cargo
    NPM_CONFIG_LOGLEVEL: info
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=ipc
  - --share=network
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.freedesktop.secrets
  - --system-talk-name=org.freedesktop.NetworkManager
  - --filesystem=xdg-run/tray-icon:create
  - --filesystem=xdg-download
  - --filesystem=xdg-documents
  
modules:
  - name: fusermount-wrapper # Need for mount and other (Actually only for mount) rclone operations
    buildsystem: simple
    sources:
      - type: file
        path: fusermount-wrapper.sh
    build-commands:
      - install -Dm755 fusermount-wrapper.sh /app/bin/fusermount3

  - shared-modules/libayatana-appindicator/libayatana-appindicator-gtk3.json
  - name: rclone-manager
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/node20/bin:/usr/lib/sdk/rust-stable/bin
      build-args:
        - --share=network
      env:
        CARGO_HOME: /run/build/rclone-manager/cargo
        NPM_CONFIG_LOGLEVEL: info
        npm_config_cache: /run/build/rclone-manager/flatpak-node/npm-cache
        npm_config_nodedir: /usr/lib/sdk/node20
    sources:
      - type: dir
        path: ../rclone-manager
      
      - type: dir
        path: ../rcman
        dest: rcman-src
    
    build-commands:
      # Patch Cargo.toml to point to the internal 'rcman' source
      - sed -i 's|path = "../../rcman"|path = "../rcman-src"|' src-tauri/Cargo.toml

      # Install npm dependencies (network enabled)
      - npm ci --legacy-peer-deps

      - cargo fetch --manifest-path src-tauri/Cargo.toml --verbose
      
      # Disable font inlining to avoid network requests during build
      - jq '.projects."rclone-manager".architect.build.options.optimization = {"fonts":false} | .projects."rclone-manager".architect.build.configurations.production.optimization = {"fonts":false, "scripts":true, "styles":true}' angular.json > angular.json.tmp && mv angular.json.tmp angular.json
      
      # Disable updater artifacts in Tauri config for Flatpak builds
      - npm run tauri build -- --bundles deb --config '{"bundle":{"createUpdaterArtifacts":false}}' --features flatpak
      

      # Extract and install from the generated .deb
      - mkdir extracted
      - ar -x src-tauri/target/release/bundle/deb/*.deb --output extracted
      - tar -C extracted -xf extracted/data.tar.gz
      - install -Dm755 extracted/usr/bin/rclone-manager /app/bin/rclone-manager

      # Copy libraries (For now, only language packs)      
      - cp -r extracted/usr/lib/* /app/lib/

      # Install icons
      - install -Dm644 extracted/usr/share/icons/hicolor/128x128/apps/'rclone-manager.png' /app/share/icons/hicolor/128x128/apps/io.github.zarestia_dev.rclone-manager.png
      - install -Dm644 extracted/usr/share/icons/hicolor/32x32/apps/'rclone-manager.png' /app/share/icons/hicolor/32x32/apps/io.github.zarestia_dev.rclone-manager.png
      - install -Dm644 extracted/usr/share/icons/hicolor/256x256@2/apps/'rclone-manager.png' /app/share/icons/hicolor/256x256@2/apps/io.github.zarestia_dev.rclone-manager.png
      
      # Install metadata
      - install -Dm644 extracted/usr/share/metainfo/io.github.zarestia_dev.rclone-manager.metainfo.xml /app/share/metainfo/io.github.zarestia_dev.rclone-manager.metainfo.xml
      
      # Install and modify desktop file
      - install -Dm644 extracted/usr/share/applications/'RClone Manager.desktop' /app/share/applications/io.github.zarestia_dev.rclone-manager.desktop
      - desktop-file-edit --set-icon=io.github.zarestia_dev.rclone-manager /app/share/applications/io.github.zarestia_dev.rclone-manager.desktop
      - desktop-file-edit --set-key=Comment --set-value='Cross-platform User Friendly UI for rclone' /app/share/applications/io.github.zarestia_dev.rclone-manager.desktop
